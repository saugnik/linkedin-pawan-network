<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leverest — Contact Directory</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --line:#262d38; --line2:#1c222b;
    --ink:#e8edf4; --dim:#8a93a3; --faint:#5b6472;
    --accent:#d4a24e; --accent2:#4e8fd4; --ok:#3fb27f;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.4}
  .wrap{max-width:1080px;margin:0 auto;padding:22px 18px 60px}
  .head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:16px}
  .title{font-family:var(--mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
  .title b{color:var(--ink);font-weight:600}
  .count{font-family:var(--mono);font-size:13px;color:var(--accent)}
  .count .tot{color:var(--faint)}
  .search{position:relative;margin-bottom:12px}
  .search input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:8px;
    color:var(--ink);font-size:17px;padding:14px 16px 14px 42px;font-family:var(--sans);outline:none}
  .search input:focus{border-color:var(--accent)}
  .search .mag{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:16px}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .seg{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg button{background:var(--panel);color:var(--dim);border:0;padding:7px 12px;font-family:var(--mono);
    font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-right:1px solid var(--line2)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--accent);color:#10131a;font-weight:600}
  select,.chk{background:var(--panel);border:1px solid var(--line);border-radius:7px;color:var(--dim);
    padding:7px 10px;font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer}
  .chk{display:flex;align-items:center;gap:7px;user-select:none}
  .chk input{accent-color:var(--accent);cursor:pointer}
  .chk.on{color:var(--accent);border-color:var(--accent)}
  .exp{margin-left:auto;background:transparent;border:1px solid var(--accent2);color:var(--accent2);
    border-radius:7px;padding:7px 13px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;cursor:pointer}
  .exp:hover{background:var(--accent2);color:#10131a}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{position:sticky;top:0;background:var(--bg);text-align:left;font-family:var(--mono);
    font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);
    padding:8px 10px;border-bottom:1px solid var(--line);font-weight:500}
  tbody td{padding:9px 10px;border-bottom:1px solid var(--line2);vertical-align:top}
  tbody tr:hover{background:#12161d}
  .nm{font-weight:600;white-space:nowrap}
  .nm a{color:var(--ink);text-decoration:none}
  .nm a:hover{color:var(--accent2);text-decoration:underline}
  .co{color:var(--ink)}
  .po{color:var(--dim)}
  .em{font-family:var(--mono);font-size:11.5px;color:var(--ok)}
  .yr{font-family:var(--mono);font-size:11.5px;color:var(--faint);text-align:right}
  .badge{font-family:var(--mono);font-size:9px;letter-spacing:.04em;padding:1px 5px;border-radius:4px;margin-left:6px;vertical-align:middle}.b-verified{background:rgba(63,178,127,.18);color:#3fb27f}.b-extrapolated{background:rgba(212,162,78,.18);color:#d4a24e}mark{background:rgba(212,162,78,.28);color:var(--accent);border-radius:2px;padding:0 1px}
  .empty{padding:40px;text-align:center;color:var(--faint);font-family:var(--mono);font-size:13px}
  .more{padding:14px;text-align:center;color:var(--faint);font-family:var(--mono);font-size:12px}
  .hint{color:var(--faint);font-size:11.5px;font-family:var(--mono);margin-top:-6px;margin-bottom:14px}
  @media(max-width:640px){.po,.yr,thead .h-po,thead .h-yr{display:none}}
</style>
</head>

<div class="wrap">
  <div class="head">

      <button data-s="all" class="on">All fields</button>
      <button data-s="n">Name</button>
      <button data-s="c">Company</button>
      <button data-s="p">Role</button>

    <button class="exp" id="export">Export results &#8595; CSV</button>

  <table>

    </tr></thead>
    <tbody id="body"></tbody>
  </table>
  <div id="more"></div>
</div>

document.querySelector('.tot').textContent = '/ '+DATA.length;
let scope='all', year='', emailOnly=false, q='', limit=300;

const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function hl(t,terms){t=esc(t);if(!terms.length)return t;
  for(const w of terms){if(!w)continue;
    t=t.replace(new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>');}
  return t;}

// populate years
[...new Set(DATA.map(r=>r.y).filter(Boolean))].sort().reverse()
  .forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;document.getElementById('year').appendChild(o);});

function match(r,terms){
  let hay;
  if(scope==='all') hay=(r.n+' '+r.c+' '+r.p).toLowerCase();
  else hay=(r[scope]||'').toLowerCase();
  return terms.every(w=>hay.includes(w));
}
function filtered(){
  const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  return DATA.filter(r=>{
    if(year && r.y!==year) return false;
    if(emailOnly && !r.e) return false;
    return match(r,terms);
  });
}
function render(){
  const res=filtered(), terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  document.getElementById('shown').textContent=res.length;
  const body=document.getElementById('body'), more=document.getElementById('more');
  if(!res.length){body.innerHTML='';more.innerHTML='<div class="empty">No connections match.</div>';return;}
  const slice=res.slice(0,limit);
  body.innerHTML=slice.map(r=>{
    const nm=r.u?`<a href="${esc(r.u)}" target="_blank" rel="noopener">${hl(r.n,terms)}</a>`:hl(r.n,terms);
    return `<tr>
      <td class="nm">${nm}</td>
      <td class="co">${hl(r.c,terms)}</td>
      <td class="po">${hl(r.p,terms)}</td>
      <td class="em">${esc(r.e)}${r.es&&r.es!=="linkedin"?'<span class="badge b-'+r.es+'">'+(r.es==="verified"?"✓ verified":r.es==="extrapolated"?"~ guessed":"")+'</span>':''}</td>
      <td class="yr">${esc(r.y)}</td></tr>`;
  }).join('');
  more.innerHTML = res.length>limit
    ? `<div class="more">Showing first ${limit} of ${res.length}. Refine your search to narrow down.</div>` : '';
}
function exportCSV(){
  const res=filtered();
  const head=['Name','Company','Role','Email','Year','LinkedIn URL'];
  const lines=[head.join(',')].concat(res.map(r=>
    [r.n,r.c,r.p,r.e,r.y,r.u].map(v=>'"'+(v||'').replace(/"/g,'""')+'"').join(',')));
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='network_search_results.csv';a.click();
}

document.getElementById('q').addEventListener('input',e=>{q=e.target.value;limit=300;render();});
document.getElementById('scope').addEventListener('click',e=>{
  if(e.target.tagName!=='BUTTON')return;
  scope=e.target.dataset.s;
  [...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target));
  render();
});
document.getElementById('year').addEventListener('change',e=>{year=e.target.value;render();});
document.getElementById('eml').addEventListener('change',e=>{
  emailOnly=e.target.checked;
  document.getElementById('emlbl').classList.toggle('on',emailOnly);render();});
document.getElementById('export').addEventListener('click',exportCSV);
render();
